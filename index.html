<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ph Tube</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .active{
      background-color: #FF1F3D;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <nav class="w-11/12 mx-auto flex justify-between items-center border-b-2 py-5 border-[#17171720]">
      <div class="logo">
        <img class="w-[120px]" src="./assets/Logo.png" alt="">
      </div>
      <div class="sort">
        <button class="btn hover:bg-[#FF1F3D] hover:text-white">Sort by view</button>
      </div>
      <div class="blog">
        <button class="btn bg-[#FF1F3D] text-white">Blogs</button>
      </div>
    </nav>
  </header>

  <nav id="category-container" class="flex justify-center py-5 gap-5">
    <div>
      <button id="btn-all" onclick="loadVideos(id)" class="btn btn-sm active">All</button>
    </div>
    
  </nav>

  
  <main>
      <section class="w-11/12 mx-auto grid grid-cols-4 gap-5" id="video-container">

        <div class="py-64 col-span-full flex flex-col justify-center items-center">
          <img src="./assets/Icon.png" alt="">
          <h2 class="text-2xl font-bold">Oops!! There is no content here</h2>
        </div>
      </section>
  </main>

  <script src="./script/index.js"></script>
</body>
</html>
